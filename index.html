<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACUVUE Touch Kiosk</title>
<style>
  :root{
    --acuvue-blue:#005EB8;
    --acuvue-blue-deep:#004A93;
    --acuvue-line:#C9DDF3;
    --acuvue-sub:#5B7894;
    --acuvue-bg:#EEF6FD;
    --shadow:0 18px 34px rgba(0,74,147,.10);
    --shadow-btn:0 10px 18px rgba(0,94,184,.18);
  }

  *{box-sizing:border-box}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--acuvue-bg);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
  }

  /* 실제 키오스크 화면 */
  .viewport{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:
      radial-gradient(circle at 12% 8%, rgba(0,94,184,.07) 0%, rgba(0,94,184,0) 24%),
      radial-gradient(circle at 88% 90%, rgba(0,94,184,.05) 0%, rgba(0,94,184,0) 18%),
      linear-gradient(180deg,#F7FBFF 0%, #EEF6FD 44%, #EAF3FC 100%);
  }

  /* 1080x1920 기준 아트보드 */
  .stage{
    position:absolute;
    width:1080px;
    height:1920px;
    left:50%;
    top:0;
    transform-origin:top center;
  }

  .stage::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(180deg, rgba(255,255,255,.58) 0%, rgba(255,255,255,0) 28%),
      linear-gradient(90deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 26%);
  }

  .wrap{
    position:relative;
    z-index:1;
    width:980px;
    height:100%;
    margin:0 auto;
    padding:34px 0 28px;
    display:flex;
    flex-direction:column;
  }

  .hero{
    position:relative;
    text-align:center;
    padding:4px 8px 0;
    margin-bottom:22px;
    flex:0 0 auto;
  }

  .hero-top{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:22px;
    min-height:68px;
  }

  .hero-kicker{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:68px;
    padding:0 44px;
    border-radius:999px;
    border:2px solid #D7E7F7;
    background:rgba(255,255,255,.92);
    color:var(--acuvue-blue);
    font-size:22px;
    font-weight:800;
    letter-spacing:-.02em;
    box-shadow:0 8px 16px rgba(0,94,184,.06);
    white-space:nowrap;
  }

  .search-fab{
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);
    width:68px;
    height:68px;
    border-radius:20px;
    border:2px solid #C8D2DE;
    background:linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(246,250,255,.96) 100%);
    box-shadow:0 8px 16px rgba(0,74,147,.08);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    padding:0;
  }

  .search-fab svg{
    width:28px;
    height:28px;
    stroke:#5F6878;
    stroke-width:2.6;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .hero-title{
    margin:0;
    font-size:58px;
    line-height:1.16;
    letter-spacing:-.05em;
    font-weight:900;
    color:var(--acuvue-blue-deep);
    word-break:keep-all;
  }

  .hero-desc{
    margin:14px 0 0;
    color:var(--acuvue-sub);
    font-size:26px;
    line-height:1.42;
    letter-spacing:-.02em;
    word-break:keep-all;
  }

  .cards{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    gap:22px;
    min-height:0;
  }

  .card{
    position:relative;
    display:block;
    flex:1 1 0;
    text-decoration:none;
    color:inherit;
    border-radius:40px;
    -webkit-tap-highlight-color:transparent;
  }

  .card-shell{
    position:relative;
    height:100%;
    border-radius:40px;
    padding:30px 30px 26px;
    border:2px solid var(--acuvue-line);
    background:
      radial-gradient(circle at 88% 20%, rgba(0,94,184,.055) 0%, rgba(0,94,184,0) 18%),
      linear-gradient(180deg,#FFFFFF 0%, #F8FBFF 100%);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .card-shell::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,0) 42%);
  }

  .card-shell::after{
    content:"";
    position:absolute;
    right:-22px;
    top:-22px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(0,94,184,.045);
    filter:blur(6px);
    pointer-events:none;
  }

  .card-index{
    position:relative;
    z-index:2;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:88px;
    height:52px;
    padding:0 20px;
    border-radius:999px;
    border:2px solid #D5E6F7;
    background:#F5FAFF;
    color:var(--acuvue-blue);
    font-size:24px;
    font-weight:900;
    letter-spacing:.02em;
    margin-bottom:18px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
  }

  .card-copy{
    position:relative;
    z-index:2;
    max-width:56%;
  }

  .card-title{
    margin:0;
    font-size:58px;
    line-height:1.02;
    letter-spacing:-.065em;
    font-weight:900;
    white-space:pre-line;
    word-break:keep-all;
    color:var(--acuvue-blue-deep);
  }

  .card-sub{
    margin-top:14px;
    font-size:24px;
    line-height:1.34;
    letter-spacing:-.03em;
    color:var(--acuvue-sub);
    word-break:keep-all;
  }

  .card-packshot{
    position:absolute;
    right:22px;
    top:50%;
    transform:translateY(-50%);
    width:290px;
    height:290px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
    pointer-events:none;
  }

  .card-packshot::before{
    content:"";
    position:absolute;
    inset:12px 10px 14px 10px;
    border-radius:28px;
    background:linear-gradient(180deg, rgba(234,244,255,.66) 0%, rgba(255,255,255,.18) 100%);
    border:1px dashed rgba(0,94,184,.10);
    opacity:.45;
  }

  .card-packshot img{
    position:relative;
    z-index:1;
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 12px 18px rgba(0,94,184,.16));
  }

  .card-arrow{
    position:absolute;
    right:22px;
    bottom:20px;
    z-index:3;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:15px 22px 15px 16px;
    border-radius:999px;
    background:linear-gradient(180deg,var(--acuvue-blue) 0%, var(--acuvue-blue-deep) 100%);
    color:#fff;
    font-size:22px;
    font-weight:800;
    letter-spacing:-.02em;
    box-shadow:var(--shadow-btn);
  }

  .card-arrow::before{
    content:"→";
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:32px;
    height:32px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.24);
    font-size:15px;
    font-weight:900;
    line-height:1;
    flex:0 0 32px;
  }

  sup.reg{
    font-size:.5em;
    line-height:0;
    vertical-align:super;
    position:relative;
    top:-.15em;
    margin-left:1px;
  }

  .footer-note{
    flex:0 0 auto;
    margin-top:14px;
    text-align:center;
    color:#7490AB;
    font-size:17px;
    line-height:1.38;
    letter-spacing:-.01em;
  }

  .search-modal{
    position:fixed;
    inset:0;
    z-index:999;
    display:none;
    align-items:flex-start;
    justify-content:center;
    background:rgba(12,28,52,.26);
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
    padding:44px 28px 24px;
  }

  .search-modal.open{ display:flex; }

  .search-panel{
    position:relative;
    width:920px;
    height:1580px;
    border-radius:30px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 26px 60px rgba(0,48,99,.22);
    border:1px solid rgba(201,221,243,.9);
  }

  .search-close{
    position:absolute;
    top:16px;
    right:16px;
    z-index:3;
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    background:rgba(20,58,99,.78);
    color:#fff;
    font-size:30px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }

  .search-frame{
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#fff;
  }
</style>
</head>
<body>
  <div class="viewport">
    <div class="stage" id="stage">
      <div class="wrap">

        <section class="hero">
          <div class="hero-top">
            <div class="hero-kicker">ACUVUE<sup class="reg">®</sup> Interactive Experience</div>

            <button class="search-fab" type="button" aria-label="제품 검색 열기" title="제품 검색" onclick="openSearchModal()">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5"></circle>
                <line x1="16" y1="16" x2="21" y2="21"></line>
              </svg>
            </button>
          </div>

          <h1 class="hero-title">아큐브<sup class="reg">®</sup> 기술력을<br>직접 체험해 보세요</h1>
          <p class="hero-desc">난시와 멀티포컬 기술력을 확인할 수 있습니다.</p>
        </section>

        <section class="cards">
          <a class="card" href="./ASTIG/">
            <div class="card-shell">
              <div class="card-index">01</div>

              <div class="card-copy">
                <h2 class="card-title">저녁까지
선명한 시야</h2>
                <div class="card-sub">아큐브<sup class="reg">®</sup> 난시 기술력</div>
              </div>

              <div class="card-packshot">
                <img src="astig.png" alt="난시 제품 팩샷" />
              </div>

              <div class="card-arrow">체험 시작</div>
            </div>
          </a>

          <a class="card" href="./MF/">
            <div class="card-shell">
              <div class="card-index">02</div>

              <div class="card-copy">
                <h2 class="card-title">가까운 거리부터
먼 거리까지</h2>
                <div class="card-sub">아큐브<sup class="reg">®</sup> 멀티포컬 기술력</div>
              </div>

              <div class="card-packshot">
                <img src="mf.png" alt="멀티포컬 제품 팩샷" />
              </div>

              <div class="card-arrow">체험 시작</div>
            </div>
          </a>
        </section>

        <div class="footer-note">
          '체험 시작'을 누르면 각 체험 페이지로 이동합니다. KR_2026_287
        </div>

      </div>
    </div>
  </div>

  <div class="search-modal" id="searchModal" aria-hidden="true">
    <div class="search-panel">
      <button class="search-close" type="button" aria-label="닫기" onclick="closeSearchModal()">×</button>
      <iframe class="search-frame" src="https://justmegod88.github.io/Lens-spec/" title="제품 검색" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    const searchModal = document.getElementById('searchModal');

    function openSearchModal(){
      searchModal.classList.add('open');
      searchModal.setAttribute('aria-hidden', 'false');
    }

    function closeSearchModal(){
      searchModal.classList.remove('open');
      searchModal.setAttribute('aria-hidden', 'true');
    }

    searchModal.addEventListener('click', function(e){
      if(e.target === searchModal) closeSearchModal();
    });

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape' && searchModal.classList.contains('open')) closeSearchModal();
    });

    function fitStage(){
      const stage = document.getElementById('stage');
      const baseW = 1080;
      const baseH = 1920;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scale = Math.min(vw / baseW, vh / baseH);
      stage.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', fitStage);
    window.addEventListener('load', fitStage);
    setTimeout(fitStage, 50);
  </script>
</body>
</html>
