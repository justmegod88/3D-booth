<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ACUVUE® Experience</title>
  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-deep:#004A93;
      --acuvue-blue-soft:#2F7FD3;
      --acuvue-line:#C9DDF3;
      --acuvue-line-soft:#DCEAF8;
      --acuvue-text:#143A63;
      --acuvue-sub:#5B7894;
      --acuvue-bg:#EEF6FD;
      --white:#ffffff;
      --shadow:0 18px 34px rgba(0,74,147,.10);
      --shadow-soft:0 10px 22px rgba(0,74,147,.08);
      --shadow-btn:0 10px 18px rgba(0,94,184,.18);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
      background:var(--acuvue-bg);
    }

    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .app{
      width:100%;
      max-width:430px;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 12% 8%, rgba(0,94,184,.07) 0%, rgba(0,94,184,0) 24%),
        radial-gradient(circle at 88% 90%, rgba(0,94,184,.05) 0%, rgba(0,94,184,0) 18%),
        linear-gradient(180deg,#F7FBFF 0%, #EEF6FD 44%, #EAF3FC 100%);
      color:var(--acuvue-text);
    }

    .app::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.58) 0%, rgba(255,255,255,0) 28%),
        linear-gradient(90deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 26%);
    }

    .wrap{
      position:relative;
      z-index:1;
      padding:18px 14px 28px;
    }

    .hero{
      position:relative;
      text-align:center;
      padding:2px 6px 0;
      margin-bottom:14px;
    }

    .hero-top{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:14px;
      min-height:38px;
    }

    .hero-kicker{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 34px;
      border-radius:999px;
      border:1.5px solid #D7E7F7;
      background:rgba(255,255,255,.92);
      color:var(--acuvue-blue);
      font-size:12px;
      font-weight:800;
      letter-spacing:-.02em;
      box-shadow:0 8px 16px rgba(0,94,184,.06);
      white-space:nowrap;
    }

    .search-fab{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      width:38px;
      height:38px;
      border-radius:12px;
      border:1.5px solid #C8D2DE;
      background:linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(246,250,255,.96) 100%);
      box-shadow:0 8px 16px rgba(0,74,147,.08);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      padding:0;
    }

    .search-fab:active{
      transform:translateY(-50%) scale(.96);
    }

    .search-fab svg{
      width:18px;
      height:18px;
      stroke:#5F6878;
      stroke-width:2.6;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .hero-title{
      margin:0;
      font-size:24px;
      line-height:1.28;
      letter-spacing:-.05em;
      font-weight:900;
      color:var(--acuvue-blue-deep);
      word-break:keep-all;
    }

    .hero-desc{
      margin:10px 0 0;
      color:var(--acuvue-sub);
      font-size:13px;
      line-height:1.5;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .cards{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:14px;
    }

    .card{
      position:relative;
      display:block;
      text-decoration:none;
      color:inherit;
      border-radius:30px;
      -webkit-tap-highlight-color:transparent;
    }

    .card:active{
      transform:scale(.992);
    }

    .card-shell{
      position:relative;
      min-height:232px;
      border-radius:30px;
      padding:18px 18px 18px;
      border:1.5px solid var(--acuvue-line);
      background:
        radial-gradient(circle at 88% 20%, rgba(0,94,184,.055) 0%, rgba(0,94,184,0) 18%),
        linear-gradient(180deg,#FFFFFF 0%, #F8FBFF 100%);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,0) 42%);
    }

    .card-shell::after{
      content:"";
      position:absolute;
      right:-22px;
      top:-22px;
      width:88px;
      height:88px;
      border-radius:50%;
      background:rgba(0,94,184,.045);
      filter:blur(4px);
      pointer-events:none;
    }

    .card-index{
      position:relative;
      z-index:2;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:58px;
      height:36px;
      padding:0 14px;
      border-radius:999px;
      border:1.5px solid #D5E6F7;
      background:#F5FAFF;
      color:var(--acuvue-blue);
      font-size:16px;
      font-weight:900;
      letter-spacing:.02em;
      margin-bottom:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
    }

    .card-copy{
      position:relative;
      z-index:2;
      max-width:56%;
      padding-bottom:30px;
    }

    .card-title{
      margin:0;
      font-size:34px;
      line-height:1.02;
      letter-spacing:-.065em;
      font-weight:900;
      white-space:pre-line;
      word-break:keep-all;
      color:var(--acuvue-blue-deep);
    }

    .card-title.card-title-long{
      font-size:34px;
      line-height:1.02;
      letter-spacing:-.065em;
      font-weight:900;
      text-shadow:0 0 .01px currentColor;
    }

    .card-sub{
      margin-top:12px;
      font-size:14px;
      line-height:1.4;
      letter-spacing:-.03em;
      color:var(--acuvue-sub);
      word-break:keep-all;
    }

    .card-packshot{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-52%);
      width:136px;
      height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1;
      pointer-events:none;
    }

    .card-packshot::before{
      content:"";
      position:absolute;
      inset:10px 8px 12px 10px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(234,244,255,.66) 0%, rgba(255,255,255,.18) 100%);
      border:1px dashed rgba(0,94,184,.10);
      opacity:.45;
    }

    .card-packshot img{
      position:relative;
      z-index:1;
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 12px 18px rgba(0,94,184,.16));
    }

    .card-arrow{
      position:absolute;
      right:16px;
      bottom:14px;
      z-index:3;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px 9px 11px;
      border-radius:999px;
      background:linear-gradient(180deg,var(--acuvue-blue) 0%, var(--acuvue-blue-deep) 100%);
      color:#fff;
      font-size:12px;
      font-weight:800;
      letter-spacing:-.02em;
      box-shadow:var(--shadow-btn);
    }

    .card-arrow::before{
      content:"→";
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:21px;
      height:21px;
      border-radius:50%;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.24);
      font-size:11px;
      font-weight:900;
      line-height:1;
      flex:0 0 21px;
    }


    sup.reg{
      font-size:.5em;
      line-height:0;
      vertical-align:super;
      position:relative;
      top:-.15em;
      margin-left:1px;
    }

    .footer-note{
      margin-top:16px;
      text-align:center;
      color:#7490AB;
      font-size:11px;
      line-height:1.5;
      letter-spacing:-.01em;
    }

    .search-modal{
      position:fixed;
      inset:0;
      z-index:999;
      display:none;
      align-items:flex-start;
      justify-content:center;
      background:rgba(12,28,52,.26);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      padding:42px 10px 18px;
    }

    .search-modal.open{
      display:flex;
    }

    .search-panel{
      position:relative;
      width:min(430px, 100%);
      height:min(82vh, 760px);
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 26px 60px rgba(0,48,99,.22);
      border:1px solid rgba(201,221,243,.9);
    }

    .search-close{
      position:absolute;
      top:10px;
      right:10px;
      z-index:3;
      width:36px;
      height:36px;
      border:none;
      border-radius:50%;
      background:rgba(20,58,99,.78);
      color:#fff;
      font-size:22px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .search-frame{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }

    @media (max-width:390px){
      .wrap{
        padding:16px 12px 24px;
      }

      .hero-top{
        min-height:36px;
        margin-bottom:12px;
      }

      .hero-kicker{
        height:36px;
        padding:0 26px;
        font-size:11px;
      }

      .search-fab{
        width:36px;
        height:36px;
        border-radius:11px;
      }

      .search-fab svg{
        width:16px;
        height:16px;
      }

      .hero-title{
        font-size:22px;
      }

      .hero-desc{
        font-size:12px;
      }

      .card-shell{
        min-height:220px;
        border-radius:26px;
        padding:16px;
      }

      .card-index{
        min-width:54px;
        height:34px;
        font-size:15px;
        margin-bottom:12px;
      }

      .card-copy{
        max-width:56%;
        padding-bottom:26px;
      }

      .card-title{
        font-size:31px;
      }

      .card-title.card-title-long{
        font-size:31px;
        line-height:1.02;
        letter-spacing:-.065em;
        font-weight:900;
        text-shadow:0 0 .01px currentColor;
      }

      .card-sub{
        font-size:13px;
      }

      .card-packshot{
        right:12px;
        width:124px;
        height:138px;
      }

      .card-arrow{
        right:14px;
        bottom:12px;
        font-size:11px;
        padding:8px 13px 8px 10px;
      }

      .search-modal{
        padding:28px 8px 12px;
      }

      .search-panel{
        height:min(84vh, 720px);
        border-radius:20px;
      }
    }
  
/* ===== KIOSK FULL-FIT VERSION ===== */
@media screen and (min-width: 900px) and (min-height: 1400px) and (orientation: portrait){
  html, body{
    width:100%;
    height:100%;
    min-height:100%;
    overflow:hidden;
    background:var(--acuvue-bg);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }

  .app{
    width:100vw !important;
    max-width:100vw !important;
    min-height:100vh !important;
    height:100vh !important;
  }

  .wrap{
    width:min(1020px, calc(100vw - 44px)) !important;
    height:100vh !important;
    margin:0 auto !important;
    padding:22px 0 20px !important;
    display:flex !important;
    flex-direction:column !important;
  }

  .hero{
    padding:0 4px !important;
    margin-bottom:14px !important;
    flex:0 0 auto;
  }

  .hero-top{
    min-height:56px !important;
    margin-bottom:14px !important;
  }

  .hero-kicker{
    height:56px !important;
    padding:0 34px !important;
    font-size:18px !important;
    border-radius:999px !important;
  }

  .search-fab{
    width:56px !important;
    height:56px !important;
    border-radius:16px !important;
  }

  .search-fab svg{
    width:22px !important;
    height:22px !important;
  }

  .hero-title{
    font-size:clamp(42px, 4.8vw, 54px) !important;
    line-height:1.12 !important;
  }

  .hero-desc{
    margin-top:10px !important;
    font-size:clamp(18px, 2.3vw, 24px) !important;
    line-height:1.35 !important;
  }

  .cards{
    flex:1 1 auto !important;
    display:flex !important;
    flex-direction:column !important;
    gap:16px !important;
    margin-top:14px !important;
    min-height:0 !important;
  }

  .card{
    flex:1 1 0 !important;
    min-height:0 !important;
  }

  .card-shell{
    height:100% !important;
    min-height:0 !important;
    border-radius:36px !important;
    padding:28px 28px 24px !important;
    display:flex !important;
    flex-direction:column !important;
    justify-content:flex-start !important;
  }

  .card-index{
    min-width:78px !important;
    height:48px !important;
    padding:0 18px !important;
    font-size:22px !important;
    margin-bottom:16px !important;
  }

  .card-copy{
    max-width:56% !important;
    padding-bottom:0 !important;
  }

  .card-title,
  .card-title.card-title-long{
    font-size:clamp(48px, 5.6vw, 60px) !important;
    line-height:1.02 !important;
  }

  .card-sub{
    margin-top:12px !important;
    font-size:clamp(20px, 2.2vw, 24px) !important;
    line-height:1.32 !important;
  }

  .card-packshot{
    right:18px !important;
    top:50% !important;
    transform:translateY(-50%) !important;
    width:min(29vw, 300px) !important;
    height:min(28vw, 290px) !important;
  }

  .card-packshot::before{
    inset:10px 10px 12px 10px !important;
    border-radius:24px !important;
  }

  .card-arrow{
    right:18px !important;
    bottom:18px !important;
    gap:10px !important;
    padding:14px 20px 14px 15px !important;
    font-size:20px !important;
  }

  .card-arrow::before{
    width:30px !important;
    height:30px !important;
    flex:0 0 30px !important;
    font-size:14px !important;
  }

  .footer-note{
    flex:0 0 auto;
    margin-top:10px !important;
    font-size:15px !important;
    line-height:1.35 !important;
  }

  .search-modal{
    padding:34px 20px 20px !important;
  }

  .search-panel{
    width:min(920px, 100%) !important;
    height:min(86vh, 1560px) !important;
    border-radius:28px !important;
  }

  .search-close{
    top:14px !important;
    right:14px !important;
    width:48px !important;
    height:48px !important;
    font-size:28px !important;
  }
}

</style>
</head>
<body>
  <main class="app">
    <div class="wrap">

      <section class="hero">
        <div class="hero-top">
          <div class="hero-kicker">ACUVUE<sup class="reg">®</sup>    Interactive Experience</div>

          <button
            class="search-fab"
            type="button"
            aria-label="제품 검색 열기"
            title="제품 검색"
            onclick="openSearchModal()"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5"></circle>
              <line x1="16" y1="16" x2="21" y2="21"></line>
            </svg>
          </button>
        </div>

        <h1 class="hero-title">아큐브<sup class="reg">®</sup> 기술력을<br>직접 체험해 보세요</h1>
        <p class="hero-desc">난시와 멀티포컬 기술력을 확인할 수 있습니다.</p>
      </section>

      <section class="cards">

        <a class="card" href="./ASTIG/">
          <div class="card-shell">
            <div class="card-index">01</div>

            <div class="card-copy">
              <h2 class="card-title">저녁까지
선명한 시야</h2>
              <div class="card-sub">아큐브<sup class="reg">®</sup> 난시 기술력</div>
            </div>

            <div class="card-packshot">
              <img src="astig.png" alt="난시 제품 팩샷" />
            </div>

            <div class="card-arrow">체험 시작</div>
          </div>
        </a>

        <a class="card" href="./MF/">
          <div class="card-shell">
            <div class="card-index">02</div>

            <div class="card-copy">
              <h2 class="card-title card-title-long">가까운 거리부터
먼 거리까지</h2>
              <div class="card-sub">아큐브<sup class="reg">®</sup> 멀티포컬 기술력</div>
            </div>

            <div class="card-packshot">
              <img src="mf.png" alt="멀티포컬 제품 팩샷" />
            </div>

            <div class="card-arrow">체험 시작</div>
          </div>
        </a>

      </section>

      <div class="footer-note">
        '체험 시작'을 누르면 각 체험 페이지로 이동합니다. KR_2026_287
      </div>

    </div>
  </main>

  <div class="search-modal" id="searchModal" aria-hidden="true">
    <div class="search-panel">
      <button class="search-close" type="button" aria-label="닫기" onclick="closeSearchModal()">×</button>
      <iframe
        class="search-frame"
        src="https://justmegod88.github.io/Lens-spec/"
        title="제품 검색"
        loading="lazy"
      ></iframe>
    </div>
  </div>

  <script>
    const searchModal = document.getElementById('searchModal');

    function openSearchModal(){
      searchModal.classList.add('open');
      searchModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeSearchModal(){
      searchModal.classList.remove('open');
      searchModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    searchModal.addEventListener('click', function(e){
      if(e.target === searchModal){
        closeSearchModal();
      }
    });

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape' && searchModal.classList.contains('open')){
        closeSearchModal();
      }
    });
  </script>
</body>
