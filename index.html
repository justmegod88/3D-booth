<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ACUVUE® Experience - Kiosk</title>
  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-deep:#004A93;
      --acuvue-line:#C9DDF3;
      --acuvue-sub:#5B7894;
      --acuvue-bg:#EEF6FD;
      --shadow:0 45px 85px rgba(0,74,147,.10);
      --shadow-btn:0 25px 45px rgba(0,94,184,.18);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      width:1080px;
      height:1920px;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
      background:var(--acuvue-bg);
    }

    body{
      background:
        radial-gradient(circle at 12% 8%, rgba(0,94,184,.07) 0%, rgba(0,94,184,0) 24%),
        radial-gradient(circle at 88% 90%, rgba(0,94,184,.05) 0%, rgba(0,94,184,0) 18%),
        linear-gradient(180deg,#F7FBFF 0%, #EEF6FD 44%, #EAF3FC 100%);
      color:#143A63;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.58) 0%, rgba(255,255,255,0) 28%),
        linear-gradient(90deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 26%);
    }

    .app{
      position:relative;
      z-index:1;
      width:1080px;
      height:1920px;
      padding:45px 35px 55px;
      display:flex;
      flex-direction:column;
    }

    .hero{
      position:relative;
      text-align:center;
      padding:5px 15px 0;
      margin-bottom:30px;
      flex:0 0 auto;
    }

    .hero-top{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:42px;
      min-height:95px;
    }

    .hero-kicker{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:95px;
      padding:0 85px;
      border-radius:999px;
      border:4px solid #D7E7F7;
      background:rgba(255,255,255,.92);
      color:var(--acuvue-blue);
      font-size:34px;
      font-weight:800;
      letter-spacing:-.02em;
      box-shadow:0 20px 30px rgba(0,94,184,.06);
      white-space:nowrap;
    }

    .search-fab{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      width:95px;
      height:95px;
      border-radius:30px;
      border:4px solid #C8D2DE;
      background:linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(246,250,255,.96) 100%);
      box-shadow:0 20px 30px rgba(0,74,147,.08);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:0;
    }

    .search-fab svg{
      width:44px;
      height:44px;
      stroke:#5F6878;
      stroke-width:2.8;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .hero-title{
      margin:0;
      font-size:60px;
      line-height:1.18;
      letter-spacing:-.05em;
      font-weight:900;
      color:var(--acuvue-blue-deep);
      word-break:keep-all;
    }

    .hero-desc{
      margin:24px 0 0;
      color:var(--acuvue-sub);
      font-size:33px;
      line-height:1.45;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .cards{
      display:flex;
      flex-direction:column;
      gap:30px;
      flex:1 1 auto;
      min-height:0;
    }

    .card{
      position:relative;
      display:block;
      flex:1 1 0; min-height:760px; min-height:760px;
      text-decoration:none;
      color:inherit;
      border-radius:75px;
    }

    .card-shell{
      position:relative;
      height:100%;
      border-radius:75px;
      padding:52px 48px 42px;
      border:4px solid var(--acuvue-line);
      background:
        radial-gradient(circle at 88% 20%, rgba(0,94,184,.055) 0%, rgba(0,94,184,0) 18%),
        linear-gradient(180deg,#FFFFFF 0%, #F8FBFF 100%);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,0) 42%);
    }

    .card-shell::after{
      content:"";
      position:absolute;
      right:-55px;
      top:-55px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(0,94,184,.045);
      filter:blur(8px);
      pointer-events:none;
    }

    .card-index{
      position:relative;
      z-index:2;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:160px;
      height:98px;
      padding:0 35px;
      border-radius:999px;
      border:4px solid #D5E6F7;
      background:#F5FAFF;
      color:var(--acuvue-blue);
      font-size:46px;
      font-weight:900;
      letter-spacing:.02em;
      margin-bottom:42px;
      box-shadow:inset 0 2px 0 rgba(255,255,255,.7);
    }

    .card-copy{
      position:relative;
      z-index:2;
      max-width:52%;
      padding-bottom:90px;
    }

    .card-title{
      margin:0;
      font-size:98px;
      line-height:1.02;
      letter-spacing:-.065em;
      font-weight:900;
      white-space:pre-line;
      word-break:keep-all;
      color:var(--acuvue-blue-deep);
    }

    .card-title.card-title-long{
      font-size:94px;
      line-height:1.02;
      letter-spacing:-.065em;
      font-weight:900;
    }

    .card-sub{
      margin-top:32px;
      font-size:39px;
      line-height:1.35;
      letter-spacing:-.03em;
      color:var(--acuvue-sub);
      word-break:keep-all;
    }

    .card-packshot{
      position:absolute;
      right:34px;
      top:50%;
      transform:translateY(-52%);
      width:410px;
      height:430px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1;
      pointer-events:none;
    }

    .card-packshot::before{
      content:"";
      position:absolute;
      inset:20px 16px 24px 20px;
      border-radius:50px;
      background:linear-gradient(180deg, rgba(234,244,255,.66) 0%, rgba(255,255,255,.18) 100%);
      border:2px dashed rgba(0,94,184,.10);
      opacity:.45;
    }

    .card-packshot img{
      position:relative;
      z-index:1;
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 20px 26px rgba(0,94,184,.16));
    }

    .card-arrow{
      position:absolute;
      right:34px;
      bottom:30px;
      z-index:3;
      display:inline-flex;
      align-items:center;
      gap:18px;
      padding:24px 36px 24px 28px;
      border-radius:999px;
      background:linear-gradient(180deg,var(--acuvue-blue) 0%, var(--acuvue-blue-deep) 100%);
      color:#fff;
      font-size:34px;
      font-weight:800;
      letter-spacing:-.02em;
      box-shadow:var(--shadow-btn);
    }

    .card-arrow::before{
      content:"→";
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:56px;
      height:56px;
      border-radius:50%;
      background:rgba(255,255,255,.18);
      border:2px solid rgba(255,255,255,.24);
      font-size:27px;
      font-weight:900;
      line-height:1;
      flex:0 0 52px;
    }

    sup.reg{
      font-size:.5em;
      line-height:0;
      vertical-align:super;
      position:relative;
      top:-.15em;
      margin-left:1px;
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      color:#7490AB;
      font-size:22px;
      line-height:1.42;
      letter-spacing:-.01em;
      flex:0 0 auto;
    }

    .search-modal{
      position:fixed;
      inset:0;
      z-index:999;
      display:none;
      align-items:flex-start;
      justify-content:center;
      background:rgba(12,28,52,.26);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      padding:80px 30px 30px;
    }

    .search-modal.open{ display:flex; }

    .search-panel{
      position:relative;
      width:980px;
      height:1650px;
      border-radius:60px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 26px 60px rgba(0,48,99,.22);
      border:1px solid rgba(201,221,243,.9);
    }

    .search-close{
      position:absolute;
      top:22px;
      right:22px;
      z-index:3;
      width:70px;
      height:70px;
      border:none;
      border-radius:50%;
      background:rgba(20,58,99,.78);
      color:#fff;
      font-size:38px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .search-frame{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-top">
        <div class="hero-kicker">ACUVUE<sup class="reg">®</sup> Interactive Experience</div>
        <button class="search-fab" type="button" aria-label="제품 검색 열기" title="제품 검색" onclick="openSearchModal()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <line x1="16" y1="16" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>

      <h1 class="hero-title">아큐브<sup class="reg">®</sup> 기술력을<br>직접 체험해 보세요</h1>
      <p class="hero-desc">난시와 멀티포컬 기술력을 확인할 수 있습니다.</p>
    </section>

    <section class="cards">
      <a class="card" href="./ASTIG/">
        <div class="card-shell">
          <div class="card-index">01</div>

          <div class="card-copy">
            <h2 class="card-title">저녁까지
선명한 시야</h2>
            <div class="card-sub">아큐브<sup class="reg">®</sup> 난시 기술력</div>
          </div>

          <div class="card-packshot">
            <img src="astig.png" alt="난시 제품 팩샷" />
          </div>

          <div class="card-arrow">체험 시작</div>
        </div>
      </a>

      <a class="card" href="./MF/">
        <div class="card-shell">
          <div class="card-index">02</div>

          <div class="card-copy">
            <h2 class="card-title card-title-long">가까운 거리부터
먼 거리까지</h2>
            <div class="card-sub">아큐브<sup class="reg">®</sup> 멀티포컬 기술력</div>
          </div>

          <div class="card-packshot">
            <img src="mf.png" alt="멀티포컬 제품 팩샷" />
          </div>

          <div class="card-arrow">체험 시작</div>
        </div>
      </a>
    </section>

    <div class="footer-note">
      '체험 시작'을 누르면 각 체험 페이지로 이동합니다. KR_2026_287
    </div>
  </main>

  <div class="search-modal" id="searchModal" aria-hidden="true">
    <div class="search-panel">
      <button class="search-close" type="button" aria-label="닫기" onclick="closeSearchModal()">×</button>
      <iframe class="search-frame" src="https://justmegod88.github.io/Lens-spec/" title="제품 검색" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    const searchModal = document.getElementById('searchModal');

    function openSearchModal(){
      searchModal.classList.add('open');
      searchModal.setAttribute('aria-hidden', 'false');
    }

    function closeSearchModal(){
      searchModal.classList.remove('open');
      searchModal.setAttribute('aria-hidden', 'true');
    }

    searchModal.addEventListener('click', function(e){
      if(e.target === searchModal){
        closeSearchModal();
      }
    });

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape' && searchModal.classList.contains('open')){
        closeSearchModal();
      }
    });
  </script>
</body>
</html>
